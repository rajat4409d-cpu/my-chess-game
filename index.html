<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chess Dashboard</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        
        <div class="game-column">
            <div id="gameStatus">White to move</div>
            
            <div id="boardContainer">
                <div id="myBoard"></div>
                
                <div id="promotionMenu">
                    <p>Promote Pawn to:</p>
                    <div class="promo-pieces">
                        <img src="" data-piece="q" class="promo-piece" alt="Queen">
                        <img src="" data-piece="r" class="promo-piece" alt="Rook">
                        <img src="" data-piece="b" class="promo-piece" alt="Bishop">
                        <img src="" data-piece="n" class="promo-piece" alt="Knight">
                    </div>
                    <button id="cancelPromoBtn">Cancel Move</button>
                </div>
            </div>

            <div class="button-group">
                <button id="resetBtn">Restart Game</button>
                <button id="settingsBtn" class="btn-secondary">Settings</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel player-card">
                <div class="player-info"><div class="avatar">♟️</div><span>Player 2 (Black)</span></div>
                <div id="timerBlack" class="timer">10:00</div>
            </div>

            <div class="panel history-panel">
                <h3>Move History</h3>
                <div class="history-list" id="moveHistory">
                    </div>
            </div>

            <div class="panel player-card">
                <div class="player-info"><div class="avatar">♙</div><span>Player 1 (White)</span></div>
                <div id="timerWhite" class="timer active">10:00</div>
            </div>
        </div>
    </div>

    <div id="settingsModal">
        <div class="settings-content">
            <h2>Game Settings</h2>
            
            <div class="settings-group">
                <label>Time Control</label>
                <select id="timeSelect">
                    <option value="60">1 Minute (Bullet)</option>
                    <option value="180">3 Minutes (Blitz)</option>
                    <option value="300">5 Minutes (Blitz)</option>
                    <option value="600" selected>10 Minutes (Rapid)</option>
                </select>
            </div>

            <div class="settings-group">
                <label>Board Options</label>
                <button id="flipBoardBtn" class="btn-secondary">Flip Board</button>
            </div>

            <div class="button-group">
                <button id="closeSettingsBtn" class="btn-secondary">Cancel</button>
                <button id="saveSettingsBtn">Save & Restart</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
