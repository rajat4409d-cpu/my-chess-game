<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chess Engine</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-layout">
        
        <aside class="left-nav">
            <div class="logo">♔ ChessEngine</div>
            <ul class="nav-links">
                <li><span class="icon">🏠</span> Home</li>
                <li class="active"><span class="icon">♟️</span> Play</li>
                <li><span class="icon">📊</span> Analyze</li>
            </ul>
        </aside>

        <main class="board-area">
            <div id="gameStatus">White to move</div>
            <div id="openingTracker">Standard Starting Position</div>

            <div class="board-profile opponent-profile">
                <div class="player-info"><div class="avatar">🤖</div><span>Stockfish AI (Level 20)</span></div>
                <div id="timerBlack" class="timer">10:00</div>
            </div>
            
            <div id="boardContainer">
                <div id="evalBar">
                    <div id="evalFill"></div>
                </div>

                <div id="myBoard"></div>

                <div id="boardControls">
                    <button id="flipBoardBtn" title="Flip Board">&#x1F503;</button>
                </div>
                
                <div id="promotionMenu">
                    <p>Promote to:</p>
                    <div class="promo-pieces">
                        <img src="" data-piece="q" class="promo-piece" alt="Queen">
                        <img src="" data-piece="r" class="promo-piece" alt="Rook">
                        <img src="" data-piece="b" class="promo-piece" alt="Bishop">
                        <img src="" data-piece="n" class="promo-piece" alt="Knight">
                    </div>
                    <button id="cancelPromoBtn">Cancel</button>
                </div>
            </div>

            <div class="board-profile player-profile">
                <div class="player-info"><div class="avatar">♙</div><span>You (White)</span></div>
                <div id="timerWhite" class="timer active">10:00</div>
            </div>

            <div class="action-buttons">
                <button id="undoBtn" class="btn-outline" title="Undo Last Move">⟲ Undo</button>
                <button id="drawBtn" class="btn-outline" title="Offer a Draw">½ Draw</button>
                <button id="resignBtn" class="btn-outline btn-danger-outline" title="Resign Game">🏳️ Resign</button>
                <button id="downloadPgnBtn" class="btn-outline" title="Download Match">📥 PGN</button>
                <button id="resetBtn" class="btn-outline" title="Restart Game">Restart</button>
                <button id="settingsBtn" class="btn-outline" title="Settings">⚙️</button>
            </div>
        </main>

        <aside class="right-panel">
            <div class="panel-header">Match Data</div>
            
            <div class="graveyard-container">
                <p class="section-title">Captured by Black</p>
                <div class="captured-area" id="capturedByBlack"></div>
                
                <p class="section-title">Captured by White</p>
                <div class="captured-area" id="capturedByWhite"></div>
            </div>

            <div class="history-container">
                <p class="section-title">Move History</p>
                <div class="history-list" id="moveHistory"></div>
            </div>
        </aside>

    </div>

    <div id="settingsModal">
        <div class="settings-content">
            <h2>Game Settings</h2>
            
            <div class="settings-group">
                <label>Game Mode</label>
                <select id="modeSelect">
                    <option value="pve" selected>1 Player (vs Computer)</option>
                    <option value="pvp">2 Player (Local Match)</option>
                </select>
            </div>

            <div class="settings-group"><label>Time Control</label><select id="timeSelect">
                <option value="60">1 Min</option><option value="180">3 Min</option><option value="300">5 Min</option><option value="600" selected>10 Min</option>
            </select></div>
            <div class="settings-group"><label>Difficulty</label><select id="difficultySelect">
                <option value="1">Beginner</option><option value="10" selected>Advanced</option><option value="20">Grandmaster</option>
            </select></div>
            
            <div class="settings-group"><label>Piece Style</label><select id="pieceSelect">
                <option value="wikipedia" selected>Classic (Wikipedia)</option>
                <option value="alpha">Modern (Alpha)</option>
                <option value="uscf">Wood (USCF)</option>
            </select></div>

            <div class="settings-group"><label>Board Theme</label><select id="themeSelect">
                <option value="classic">Wood</option>
                <option value="green" selected>Mint Green</option>
                <option value="blue">Lichess Blue</option>
                <option value="monochrome">Sleek Monochrome</option>
                <option value="coral">Soft Coral</option>
            </select></div>
            
            <div class="modal-buttons">
                <button id="closeSettingsBtn" class="btn-outline">Cancel</button>
                <button id="saveSettingsBtn" class="btn-primary">Save & Restart</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
