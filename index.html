<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Chess Game</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1e1e1e;
            color: white;
            padding: 40px;
        }
        h1 {
            margin-bottom: 0px;
        }
        #gameStatus {
            font-size: 20px;
            font-weight: bold;
            color: #4CAF50;
            margin-top: 10px;
            margin-bottom: 5px;
            height: 25px;
        }
        #myBoard {
            width: 450px;
            margin-top: 10px;
            border: 4px solid #333;
            border-radius: 4px;
        }
        button {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #007acc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #005f9e;
        }

        /* NEW: CSS for the green dots on possible moves */
        .possible-move {
            position: relative;
        }
        .possible-move::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px;
            height: 22px;
            background-color: rgba(20, 85, 30, 0.6); /* Dark green with transparency */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            /* This ensures the dot doesn't block you from dropping the piece on the square */
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <h1>My Chess Game</h1>
    
    <div id="gameStatus">White to move</div>
    
    <div id="myBoard"></div>
    
    <button id="resetBtn">Restart Game</button>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#gameStatus');

        // NEW: Function to clear the green dots
        function removeHighlights() {
            $('#myBoard .square-55d63').removeClass('possible-move');
        }

        // NEW: Function to update the text and trigger confetti
        function updateStatus() {
            var statusHTML = '';
            var moveColor = (game.turn() === 'w') ? 'White' : 'Black';

            if (game.in_checkmate()) {
                // If checkmate, state the winner and fire the confetti!
                var winner = (game.turn() === 'w') ? 'Black' : 'White';
                statusHTML = 'Checkmate! ' + winner + ' wins! 🎉';
                
                // Fire the confetti
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 } // Start slightly below the top of the screen
                });

            } else if (game.in_draw()) {
                statusHTML = 'Game Over. It\'s a Draw!';
            } else {
                // Normal turn
                statusHTML = moveColor + ' to move';
                
                // Add "(In Check)" if applicable
                if (game.in_check()) {
                    statusHTML += ' (In Check!)';
                }
            }

            $status.text(statusHTML);
        }

        // UPDATED: Allow both players to drag, and show the green dots
        function onDragStart (source, piece, position, orientation) {
            // Do not pick up pieces if the game is over
            if (game.game_over()) return false;

            // Only pick up pieces for the side whose turn it is
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }

            // Get a list of all legal moves for the piece we just picked up
            var moves = game.moves({
                square: source,
                verbose: true
            });

            // If there are no legal moves, don't let them pick it up
            if (moves.length === 0) return false;

            // Add the 'possible-move' CSS class to every target square
            for (var i = 0; i < moves.length; i++) {
                $('#myBoard .square-' + moves[i].to).addClass('possible-move');
            }
        }

        function onDrop (source, target) {
            // Immediately remove the green dots when the piece is dropped
            removeHighlights();

            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            // Update the status text and check for a win
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        var config = {
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };

        board = Chessboard('myBoard', config);

        // Make sure the text is correct when the page first loads
        updateStatus();

        $('#resetBtn').on('click', function () {
            game.reset();
            board.start();
            updateStatus();
        });
    </script>
</body>
</html>
